name: app_gym
description: Aplicación móvil de fitness con coach IA.
publish_to: 'none'
version: 0.1.0+1
environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.0
  # Nuevas dependencias para el rediseño UI
  provider: ^6.1.2           # State management del entreno activo
  flutter_animate: ^4.5.0   # Micro-animaciones declarativas
  google_fonts: ^6.2.1      # Tipografía Inter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
